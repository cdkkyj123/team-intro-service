name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # CI - 테스트 & 빌드
  ci:
    runs-on: ubuntu-latest

    steps:
      # Step 1: 코드 가져오기
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Java 17 설치
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      # Step 3: Gradle 캐시
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Step 4: 테스트 실행
      - name: Run tests
        env:
          AWS_REGION: ap-northeast-2
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb
          SPRING_DATASOURCE_USERNAME: sa
          SPRING_DATASOURCE_PASSWORD:
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
          SPRING_CLOUD_AWS_S3_BUCKET: profile-seok447445-files
        run: ./gradlew test

      # Step 5: JAR 빌드
      - name: Build JAR
        run: ./gradlew bootJar

      # Step 6: JAR artifact로 저장
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

  # CD - Docker Hub Push & EC2 배포
  cd:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'

    steps:
      # Step 1: 코드 가져오기 (Dockerfile 때문에 필요)
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: CI에서 빌드한 JAR 가져오기
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs/

      # Step 3: Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4: Docker 이미지 빌드 & Push
      - name: Build and push Docker image
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          docker buildx create --use
          docker buildx build --platform linux/arm64 \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/team-intro-service:$SHORT_SHA \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/team-intro-service:latest \
            --push .
          echo "✅ Pushed: ${{ secrets.DOCKERHUB_USERNAME }}/team-intro-service:$SHORT_SHA"

      # Step 5: EC2 배포
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/team-intro-service:latest
            docker stop app || true
            docker rm app || true
            docker run -d --name app -p 8080:8080 \
              ${{ secrets.DOCKERHUB_USERNAME }}/team-intro-service:latest \
              --spring.profiles.active=prod