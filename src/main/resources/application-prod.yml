spring:
  config:
    import:
      - "optional:aws-parameterstore:/team-intro/"
  datasource:
    url: ${database_url}
    username: ${username}
    password: ${password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
  cloud:
    aws:
      s3:
        bucket: profile-seok447445-files
      cloudfront:
        domain: ${CLOUDFRONT_DOMAIN}

management:
  endpoint:
    health:
      show-details: never

info:
  team-name: ${team_name}